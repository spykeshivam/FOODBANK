<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Postcode</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <a href="/login" class="home-button">← Back to Login</a>
    <div class="container" style="max-width: 400px;">
        <h1>Update Postcode</h1>
        <p style="color:#555; margin-bottom:20px;">
            The postcode on your account is missing or in an invalid format.<br>
            Please enter your correct UK postcode below.
        </p>

        {% if error %}
        <p style="color:red; font-weight:bold; margin-bottom:14px;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/update_postcode">
            <input type="hidden" name="user_id" value="{{ user_id }}">

            <label for="postcode">Postcode (e.g. E14 7AX)</label>
            <input type="text" id="postcode" name="postcode"
                   placeholder="E14 7AX" maxlength="8" required
                   style="text-transform:uppercase; margin-bottom:16px;">

            <button type="submit" class="tab" style="width:100%;">Save Postcode</button>
        </form>
    </div>

    <script>
        // Auto-insert space after outward code as the user types
        document.getElementById("postcode").addEventListener("input", function () {
            let val = this.value.replace(/\s/g, "").toUpperCase();
            if (val.length > 4) {
                val = val.slice(0, -3) + " " + val.slice(-3);
            }
            this.value = val;
        });
    </script>
</body>
</html>
