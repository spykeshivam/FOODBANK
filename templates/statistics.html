<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descriptive Statistics</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tabs {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: flex;
            gap: 20px;
        }
        .tab {
            font-size: 18px;
            font-weight: bold;
            color: #007BFF;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #007BFF;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .tab:hover {
            background-color: #007BFF;
            color: #fff;
        }
        .home-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .home-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <a href="/" class="home-button">Home Page</a>
    <div class="tabs">
    <form method="post" action="/statistics">
        <label for="date">Number of Logins for Date</label><br>
        <input type="text" id="date" name="date" placeholder="dd/mm/yyyy" required><br><br>
        <button type="submit" class="tab">Search Date</button>
        {% if result is not none %}
    <div style="text-align:center; margin-top: 20px; font-size: 20px; color: black;">
        {% if result is number %}
            Logins on {{ date }}: {{ result }}
        {% else %}
            {{ result }}
        {% endif %}
    </div>
{% endif %}
    </form>
</div>




</body>
</html>
